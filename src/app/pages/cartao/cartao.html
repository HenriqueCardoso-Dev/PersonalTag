<div class="flex items-center justify-center min-h-screen bg-sky-950 overflow-hidden">

  <div
    class="relative cursor-pointer perspective transition-all duration-700"
    (click)="flipCard()"

    [class.w-[340px]]="!isBack"
    [class.h-[520px]]="!isBack"

    [class.w-screen]="isBack"
    [class.h-screen]="isBack"
  >

    <div
      class="relative w-full h-full duration-700 transform-style preserve-3d"
      [class.rotate-y-180]="isBack"
    >

      <!-- FRONT -->
      <div
        class="absolute inset-0 rounded-2xl overflow-hidden backface-hidden
               shadow-2xl border border-zinc-400/20
               bg-gradient-to-br from-sky-800 via-blue-800 to-cyan-950
               p-5 flex flex-col"
      >

        <div class="flex items-center justify-center">
          <img src="/assets/assinatura.png" class="w-20" />

          <!-- <div
            class="flex items-center gap-2 bg-white/10 border border-white/20
                   px-3 py-1 rounded-full text-white text-xs"
          >
            <div class="w-2 h-2 rounded-full bg-emerald-400"></div>
            Ativo
          </div> -->
        </div>

        <div class="flex-1 flex items-center justify-center">
          <img
            src="/assets/cracha-icon.png"
            class="w-50 opacity-90 rounded-full
                   border-4 border-white/30"
          />
        </div>

        <div>
          <p class="text-white/60 text-xs uppercase">
            registro
          </p>

          <h3 class="text-white text-lg font-bold">
            #0001
          </h3>

          <div class="mt-3">
            <h2 class="text-white text-xl font-bold">
              Carlos H. R. Cardoso
            </h2>

            <p class="text-white/70 text-sm">
              CEO & Founder
            </p>
          </div>
        </div>
      </div>

      <!-- BACK FULLSCREEN -->
      <div
        class="absolute inset-0 bg-zinc-100 rotate-y-180 backface-hidden
               flex flex-col overflow-auto"
      >

        <!-- HEADER -->
        <div
          class="bg-gradient-to-br from-sky-800 via-blue-800 to-cyan-950 text-white px-6 py-5
                 flex items-center justify-between shadow-lg"
        >
          <div>
            <h1 class="text-xl font-bold">
              Credencial do Colaborador
            </h1>

            <p class="text-white/70 text-sm">
              Hentech Solutions
            </p>
          </div>

          <img src="/assets/marca-dagua.png" class="w-20" />
        </div>

        <!-- CONTENT -->
        <div class="flex-1 p-6 flex flex-col items-center bg-blue-950">

          <!-- QR -->
          <div class="bg-white p-5 rounded-3xl shadow-xl mt-8">
            <img
              src="/assets/qrcode.png"
              class="w-64"
            />
          </div>

          <!-- INFO -->
          <div class="w-full max-w-xl mt-10 space-y-4">

            <div class="bg-white rounded-lg p-3 shadow">
              <p class="text-zinc-400 text-xs uppercase">
                Nome
              </p>

              <p class="text-zinc-800 font-bold text-lg">
                Carlos Henrique Ramos Cardoso
              </p>
            </div>

            <div class="grid grid-cols-2 gap-4">

              <div class="bg-white rounded-lg p-3 shadow">
                <p class="text-zinc-400 text-xs uppercase">
                  registro
                </p>

                <p class="font-bold text-zinc-800">
                  #0001
                </p>
              </div>

              <div class="bg-white rounded-lg p-3 shadow">
                <p class="text-zinc-400 text-xs uppercase">
                  Validade
                </p>

                <p class="font-bold text-zinc-800">
                  --/----
                </p>
              </div>

            </div>

            <div class="bg-white rounded-lg p-3 shadow">
              <p class="text-zinc-400 text-xs uppercase">
                Setor
              </p>

              <p class="font-semibold text-zinc-600 text-sm mt-2">
                Presidência / Diretoria Executiva
              </p>
            </div>

            <div class="mt-6">
              <p class="text-zinc-400 text-xs uppercase">
                Contatos
              </p>
              <p class="font-semibold text-zinc-500 text-sm mt-2">
                @ihenriquecardoso
              </p>
              <p class="font-semibold text-zinc-500 text-sm mt-2">
                @hentech.solutions
              </p>
              <p class="font-semibold text-zinc-500 text-sm mt-2">
                <a href="tel:5511982652190">
                  11 98265-2190
                </a>
              </p>
            </div>

          </div>

        </div>

      </div>

    </div>

  </div>

</div>
